<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="icon.png" type="image/x-icon">
    <title>SOON™</title>
</head>
<body>
    <section class="container">
        <section class="middle">
        <h1>Danny</h1>
        <h1 class="soon">Soon</h1>
        </section>
    </section>
    <style>
    body {
        overflow: hidden;
        background-image: url("infobg.png");
        background-size: 30%;
        background-repeat: no-repeat;
        background-position: center center;
        font-family: quantumregular;
        font-size: 80px;
        text-align: center;
        text-transform: uppercase;
        color: #fd297b;
    }
    html, body{
        height: 100%;
    }
    .container{
        height: 100%;
        width: 100%;
        display: table;
     }
    .middle{
        display: table-cell;
        vertical-align: middle;
    }
    .soon{
        margin-top: -100px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 300;
    }
    .soon::after{
        content: 'TM';
        font-size: 30px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 300;
    }
    @font-face {
        font-family: 'quantumregular';
        src: url('quantum-webfont.woff2') format('woff2'),
        url('quantum-webfont.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }
    </style>
</body>
</html>
