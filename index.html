<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="icon.png" type="image/x-icon">
    <script src="timer.js"></script>
    <title>SOON™</title>
    <style>
            body {
                overflow: hidden;
                background-image: url("infobg.png");
                background-size: 30%;
                background-repeat: no-repeat;
                background-position: center center;
                font-family: quantumregular;
                text-align: center;
                text-transform: uppercase;
                font-size: 50px;
            }
            html, body{
                height: 100%;
            }
            .container{
                height: 100%;
                width: 100%;
                display: table;
             }
            .middle{
                display: table-cell;
                vertical-align: middle;
            }
            .icon{
                width: 250px;
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
            }
            .soon{
                position: absolute;
                left: 50%;
                bottom: 30px;
                transform: translate(-50%);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 300;
                font-size: 60px;
                background: linear-gradient(#fd297b, #ff5864);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .soon::after{
                content: 'TM';
                font-size: 30px;
                font-family: quantumregular;
                font-weight: 300;
            }
            .text{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 300;
                font-size: 20px;
                position: absolute;
                left: 50%;
                transform: translate(-50%);
                background: linear-gradient(to left, #fd297b, #ff5864);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            #timer{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 300;
                font-size: 30px;
                position: absolute;
                left: 50%;
                transform: translate(-50%);
                bottom: -30px;
                color: #fd297b;
            }
            .table, th, td{
                text-align: center;
                border: 5px solid rgba(255, 255, 255, 0);
                background: linear-gradient(to left, #fd297b, #ff5864);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            td{
                font-size: 20px;
                text-transform: none;
            }
            @font-face {
                font-family: 'quantumregular';
                src: url('quantum-webfont.woff2') format('woff2'), url('quantum-webfont.woff') format('woff');
                font-weight: normal;
                font-style: normal;
            }
            </style>
</head>
<body>
    <p class="text">This page is soon to be released, please come back later.</p> 
    
    <section class="container">
        <section class="middle">
            <img src="logo.png" alt="icon" class="icon">
            <p id="timer"></p>
        </section>
    </section>
</body>
</html>
